<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/vue.global.min.js' %}"></script>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <!-- <script src="https://unpkg.com/vue@3.3.0/dist/vue.global.js"></script> -->
    <link rel="icon" href="{% static 'favicon.jpg' %}" type="image/x-icon">
</head>

<body>
    {% csrf_token %}
    <div id="app" class="container position-relative" style="width: 500px;">
        <h2 class="mt-5">登录</h2>
        <form method="POST" @submit.prevent="submitLogin">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" v-model="form.username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" v-model="form.password" required>
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
            <div class="alert alert-danger mt-3" v-if="errorMessage">[[ errorMessage ]]</div>
        </form>
    </div>

    <!-- Axios (用于发送AJAX请求) -->
    <script src="{% static 'js/axios.min.js' %}"></script>

    <script>
        const app = Vue.createApp({
            delimiters: ['[[', ']]'],   // 默认与Django的插值语法冲突，修改语法格式
            data() { 
                return {
                    form: {
                        username: '',
                        password: ''
                    },
                    errorMessage: ''
                };
            },
            methods: {
                submitLogin() {
                    const form = new FormData();
                    form.append('username', this.form.username);
                    form.append('password', this.form.password);
                    var csrfToken = document.querySelector('[name="csrfmiddlewaretoken"]').value;

                    axios.post("{% url 'login' %}", form, {
                        headers: {
                            'X-CSRFToken': csrfToken
                        }
                    }).then(response => {
                        if (response.status == 200) {
                            window.location.href = '/index';  // 登录成功后重定向到首页
                        } else {
                            this.errorMessage = "登录失败，请检查用户名或密码。";
                        }
                    }).catch(error => {
                        console.log(error)
                        this.errorMessage = "登录时发生错误，请稍后再试。";
                    });
                }
            }
        });

        app.mount('#app');
    </script>
</body>

</html>
