<!DOCTYPE html>
<html lang="zh-CN">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'favicon.jpg' %}" type="image/x-icon">
    <title>运维平台</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    
    <link href="{% static 'css/dataTables.dataTables.css' %}" rel="stylesheet">
    <link href="{% static 'css/buttons.dataTables.css' %}" rel="stylesheet"> 
    


    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <style>
        body {
            display: flex;
        }

        #sidebar {
            position: fixed;
            min-width: 250px;
            max-width: 250px;
            background-color: #343a40;
            min-height: 100vh;
        }

        #sidebar .nav-link {
            color: #fff;
        }

        #content {
            flex-grow: 1;
            padding: 20px;
        }

        /* 自定义滚动条的整体样式 */
        ::-webkit-scrollbar {
            width: 12px; /* 设置滚动条的宽度 */
            height: 12px; /* 水平滚动条的高度（如果需要的话） */
        }

        /* 自定义滚动条轨道的样式 */
        ::-webkit-scrollbar-track {
            background: #f1f1f1; /* 轨道的背景颜色 */
            border-radius: 10px; /* 轨道的圆角 */
        }

        /* 自定义滚动条滑块的样式 */
        ::-webkit-scrollbar-thumb {
            background: #888; /* 滑块的背景颜色 */
            border-radius: 10px; /* 滑块的圆角 */
        }

        /* 当滑块悬停或激活时自定义其样式 */
        ::-webkit-scrollbar-thumb:hover {
            background: #555; /* 滑块悬停时的背景颜色 */
        }

        ::-webkit-scrollbar-thumb:active {
            background: #000; /* 滑块激活时的背景颜色 */
        }
    </style>
</head>

<body>
    {% csrf_token %}
    <div id="app" class="container-fluid">
        <div class="row">
            <!-- 左侧边栏 -->
            <div id="sidebar" class="d-flex flex-column p-3">
                <ul class="nav nav-pills flex-column mb-auto">
                    <li class="nav-item">
                        <a href="/index" class="nav-link" id="index">首页</a>
                    </li>
                    <li>
                        <a href="/aws/userManage" class="nav-link" id="aws-user-link">aws 超时未登录用户信息</a>
                    </li>
                    <li>
                        <a href="/aws/logDownLoad" class="nav-link" id="logDownLoad">Cloudwatch日志下载</a>
                    </li>
                    <li>
                        <a href="/aws/ecsInfo" class="nav-link" id="ecs-info">ecs 信息查看</a>
                    </li>
                </ul>
            </div>

            <!-- 右侧内容区域 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="background-color: #f0f0f0;">
                <div id="content-area" class="pt-3">

                    <div id="content">
                        {% block content %}
                        <!-- 默认内容 -->
                        {% endblock %}
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
    <!-- <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script> -->
    <!-- Vue.js -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.min.js"></script> -->
    <!-- <script src="{% static 'js/vue.global.min.js' %}"></script> -->
    <!-- Axios (用于发送AJAX请求) -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> -->
    <!-- <script src="{% static 'js/axios.min.js' %}"></script> -->
    <script>

    </script>

</body>

</html>
